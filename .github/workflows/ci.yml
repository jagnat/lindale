name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Odin
        uses: laytan/setup-odin@v2
        with:
          release: dev-2026-05

      # Type-check every plugin via its build shim (build.odin check mode)
      - name: Check plugins
        shell: bash
        run: |
          for d in plugins/*/; do
            echo "== check ${d} =="
            ( cd "$d" && odin run . -- check )
          done

      # The plugin check never compiles vst_host/platform_specific, so check the
      # static layer once (picks up per-OS platform code)
      - name: Check host layer
        working-directory: plugins/scopey
        run: odin check vst3 -define:PLUGIN_NAME=scopey -define:HOT_DLL=true -no-entry-point

      - name: Test dsp
        run: odin test src/dsp

      - name: Test sdk
        run: odin test src/sdk
